name: test

on:
  push:
    branches:
      - master
      - main
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    # Ephemeral PG19 per run (ARCHITECTURE.md §10). PG19 (beta) is required for
    # native application-time temporal tables; the image must be 19, not the
    # runner's bundled Postgres. Verified tag: 19beta1 (matches docker-compose.yml).
    services:
      db:
        image: postgres:19beta1
        env:
          POSTGRES_USER: tempo
          POSTGRES_PASSWORD: tempo
          POSTGRES_DB: tempo
        ports:
          # Expose on host 5434 to match the dev default in context.gleam.
          - 5434:5432
        options: >-
          --health-cmd "pg_isready -U tempo -d tempo"
          --health-interval 2s
          --health-timeout 5s
          --health-retries 15

    # Connection settings consumed by tempo/server/context.gleam.
    env:
      TEMPO_DB_HOST: 127.0.0.1
      TEMPO_DB_PORT: 5434
      TEMPO_DB_NAME: tempo
      TEMPO_DB_USER: tempo
      TEMPO_DB_PASSWORD: tempo

    steps:
      - uses: actions/checkout@v6
      - uses: erlef/setup-beam@v1
        with:
          otp-version: "29"
          gleam-version: "1.17.0"
          rebar3-version: "3"
          # elixir-version: "1"
      - run: gleam deps download
      - run: gleam run -m tempo/migrate
      - run: gleam test
      - run: gleam format --check src test

      # End-to-end (TDD layer 5): the behaviour-driven Playwright suite against
      # the real app on the v1-wide seed loaded above (PRD §7, ARCHITECTURE.md
      # §10.5). The same suite runs again on v2-split in Phase 5; both passes must
      # be green.
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      # Build the Lustre client bundle into priv/static from the JS `client`
      # package (path-depends on `shared`, ADR-014), which Wisp serves under
      # /static.
      - run: gleam run -m lustre/dev build client/app
        working-directory: client
      # Boot the Wisp server (serves the SPA + JSON API on :8000) and wait for it.
      - name: Start the server
        run: |
          gleam run > /tmp/tempo-server.log 2>&1 &
          for i in $(seq 1 60); do
            if curl -sf http://127.0.0.1:8000/ > /dev/null; then exit 0; fi
            sleep 1
          done
          echo "server did not come up"; cat /tmp/tempo-server.log; exit 1
      - name: Run the Playwright suite (v1-wide)
        run: npx playwright test
        env:
          TEMPO_BASE_URL: http://127.0.0.1:8000
      - uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
