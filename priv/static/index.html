<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Tempo</title>
    <!-- Wisp mounts priv/static under /static (router.gleam), so both the
         stylesheet and the bundle load from /static/* rather than the
         lustre/dev default of /. styles.css is a legibility-only pass
         (PRD §10): large high-contrast type, a column board, a prominent
         slider, and distinct on-leave / unassigned rows. -->
    <link rel="stylesheet" href="/static/styles.css" />
    <script type="module" src="/static/app.js"></script>
  </head>
  <body>
    <div id="app"></div>
  </body>
</html>
