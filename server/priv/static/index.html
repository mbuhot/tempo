<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Tempo</title>
    <!-- Wisp mounts priv/static under /static (router.gleam), so both the
         stylesheet and the bundle load from /static/* rather than the
         lustre/dev default of /. styles/main.css is COMPILED by Sass from
         client/styles/main.scss (bin/build), which @use-inlines the component
         partials into this one served file. The CSS source lives in
         client/styles/*.scss (ADR-047). -->
    <link rel="stylesheet" href="/static/styles/main.css" />
    <script type="module" src="/static/app.js"></script>
  </head>
  <body>
    <div id="app"></div>
  </body>
</html>
